<li class="mt-6">

  <a
    (click)="toggleHistory()"
    class="flex items-center px-3 py-2 rounded-xl cursor-pointer transition duration-200 hover:bg-slate-800 hover:text-white group">

    <!-- Icon -->
    <svg
      class="shrink-0 w-5 h-5 text-slate-400 group-hover:text-white"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24">

      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M8 10h8M8 14h5M21 12c0 4.418-4.03 8-9 8a9.96 9.96 0 0 1-4-.8L3 20l1.2-4A8 8 0 1 1 21 12Z"/>

    </svg>

    <!-- Text -->
    <span class="flex-1 ms-3 whitespace-nowrap text-slate-300">
      Recent Chats
    </span>

    <!-- Badge -->
    <span
      class="bg-slate-800 border border-slate-700 text-slate-400 text-[10px] font-semibold px-2 py-0.5 rounded-md">

      {{ history.length }}

    </span>

    <!-- Arrow -->
    <svg
      class="w-4 h-4 ml-2 text-slate-400 transition-transform duration-300"
      [ngClass]="{'rotate-180': showHistory}"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24">

      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="m19 9-7 7-7-7"/>

    </svg>

  </a>

</li>

<!-- History List -->
<li *ngIf="showHistory">

  <ul class="mt-2 space-y-1">

    <li *ngFor="let h of history">

      <a
        (click)="openHistory(h)"
        class="flex items-center ml-4 mr-2 px-3 py-2 rounded-lg cursor-pointer text-sm text-slate-400 hover:bg-slate-800 hover:text-white transition">

        <!-- Dot -->
        <span class="w-2 h-2 rounded-full bg-slate-500 mr-3"></span>

        <span class="truncate">
          {{ h.question }}
        </span>

      </a>

    </li>

  </ul>

</li>

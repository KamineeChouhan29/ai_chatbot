<div class="flex-1 flex flex-col h-[92vh] bg-slate-950 rounded-3xl overflow-hidden shadow-2xl">

    <!-- Header -->
    <div class="border-b border-slate-800 px-6 py-4 bg-slate-900">

        <h1 class="text-3xl font-bold text-center text-white">
            🤖 AI Assistant
        </h1>

        <p class="text-center text-slate-400 mt-1">
            Ask anything and get instant answers
        </p>

    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto px-6 py-5 space-y-6">

        <div
            *ngFor="let m of messagesArray"
            class="flex"
            [ngClass]="{
                'justify-end': m.own,
                'justify-start': !m.own
            }">

            <div
                *ngIf="!m.own"
                class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-600 to-purple-600 flex items-center justify-center mr-3">
                🤖
            </div>

            <div
                class="max-w-[75%] rounded-3xl px-5 py-4 shadow-lg whitespace-pre-wrap"
                [ngClass]="{
                    'bg-gradient-to-r from-blue-600 to-indigo-600 text-white': m.own,
                    'bg-slate-800 border border-slate-700 text-gray-200': !m.own
                }">

                <div
                    class="prose prose-invert max-w-none"
                    [innerHTML]="formatMessage(m.content)">
                </div>

            </div>

        </div>

        <div *ngIf="loadingChat" class="flex">

            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center mr-3">
                🤖
            </div>

            <div class="bg-slate-800 rounded-2xl px-5 py-3 text-white">
                Thinking...
            </div>

        </div>

    </div>

    <!-- Input -->
    <div class="border-t border-slate-800 bg-slate-900 p-5">

        <div class="flex gap-4">

            <textarea
                [(ngModel)]="inputTextPrompt"
                rows="2"
                placeholder="Ask anything..."
                class="flex-1 resize-none rounded-3xl bg-slate-800 border border-slate-700 px-5 py-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
            </textarea>

            <button
                (click)="askButtonClicked()"
                [disabled]="loadingChat"
                class="h-14 w-14 rounded-full bg-gradient-to-r from-blue-600 to-purple-600 hover:scale-110 transition">

                🚀

            </button>

        </div>

    </div>

</div>

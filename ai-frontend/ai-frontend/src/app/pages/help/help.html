<div class="min-h-screen bg-gray-900 flex justify-center items-center p-8">

  <div class="bg-gray-800 w-full max-w-xl rounded-2xl shadow-lg p-8">

    <h1 class="text-3xl text-center font-bold text-white mb-2">
      Need Help?
    </h1>

    <p class="text-gray-400 text-center mb-8">
      Contact our support team by filling out the form below.
    </p>

    
<form #helpForm="ngForm" (ngSubmit)="sendRequest(helpForm)">
      <!-- Name -->
      <div class="mb-4">
        <label class="block text-gray-300 mb-2">
          Name
        </label>

        <input
          type="text"
          name="name"
          [(ngModel)]="helpRequest.name"
          placeholder="Enter your name"
          required
          class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-300 mb-2">
          Email
        </label>

        <input
          type="email"
          name="email"
          [(ngModel)]="helpRequest.email"
          placeholder="Enter your email"
          required
          class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Subject -->
      <div class="mb-4">
        <label class="block text-gray-300 mb-2">
          Subject
        </label>

        <input
          type="text"
          name="subject"
          [(ngModel)]="helpRequest.subject"
          placeholder="Enter subject"
          required
          class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Message -->
      <div class="mb-6">
        <label class="block text-gray-300 mb-2">
          Message
        </label>

        <textarea
          rows="5"
          name="message"
          [(ngModel)]="helpRequest.message"
          placeholder="Describe your issue..."
          required
          class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <!-- Button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-semibold py-3 rounded-lg transition">

        {{ loading ? 'Sending...' : 'Send Request' }}

      </button>

    </form>

    <!-- Success -->
    <div
      *ngIf="successMessage"
      class="mt-6 p-3 rounded-lg bg-green-700 text-green-100 text-center">

      {{ successMessage }}

    </div>

    <!-- Error -->
    <div
      *ngIf="errorMessage"
      class="mt-6 p-3 rounded-lg bg-red-700 text-red-100 text-center">

      {{ errorMessage }}

    </div>

  </div>

</div>
